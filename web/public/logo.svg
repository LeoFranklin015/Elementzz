<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="eleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="45%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>

    <!-- Pixel grid pattern for subtle texture -->
    <pattern id="pixels" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="3" height="3" fill="rgba(255,255,255,0.03)"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fire diamond -->
  <g transform="translate(28, 60)">
    <polygon points="0,-18 14,0 0,18 -14,0" fill="#ff4400" opacity="0.9"/>
    <polygon points="0,-18 14,0 0,0" fill="#ff6622" opacity="0.6"/>
    <polygon points="0,-12 8,0 0,12 -8,0" fill="none" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Lightning bolt -->
  <g transform="translate(56, 60)">
    <polygon points="-4,-18 6,-3 0,-3 4,18 -6,3 0,3" fill="#ffaa00" opacity="0.9"/>
    <polygon points="-4,-18 6,-3 0,-3 0,3" fill="#ffcc33" opacity="0.5"/>
  </g>

  <!-- Water drop -->
  <g transform="translate(84, 60)">
    <path d="M0-16 C8,0 12,8 12,14 C12,20 6,22 0,22 C-6,22 -12,20 -12,14 C-12,8 -8,0 0-16Z" fill="#0088ff" opacity="0.9"/>
    <path d="M0-16 C8,0 12,8 12,14 C12,20 6,22 0,22 L0-16Z" fill="#33aaff" opacity="0.3"/>
  </g>

  <!-- Separator bar -->
  <rect x="108" y="38" width="3" height="44" rx="1" fill="url(#eleGrad)" opacity="0.3"/>

  <!-- ELEMENTZZ text -->
  <text x="124" y="72" font-family="'Courier New', 'Consolas', monospace" font-weight="900" font-size="48" letter-spacing="6" fill="url(#eleGrad)" filter="url(#glow)">
    ELEMENTZZ
  </text>

  <!-- Underline accent -->
  <rect x="124" y="82" width="340" height="3" rx="1" fill="url(#eleGrad)" opacity="0.5"/>

  <!-- Pixel texture overlay on text area -->
  <rect x="124" y="35" width="340" height="55" fill="url(#pixels)"/>
</svg>
